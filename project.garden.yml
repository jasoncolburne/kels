apiVersion: garden.io/v2
kind: Project
name: kels
defaultEnvironment: registry-a

environments:
  - name: registry-a
    defaultNamespace: kels-registry-a
    variables:
      envType: registry
  - name: registry-b
    defaultNamespace: kels-registry-b
    variables:
      envType: registry
  - name: registry-c
    defaultNamespace: kels-registry-c
    variables:
      envType: registry
  - name: registry-d
    defaultNamespace: kels-registry-d
    variables:
      envType: registry
  - name: standalone
    defaultNamespace: kels-standalone
    variables:
      envType: standalone
      kels:
        testEndpoints: "true"
  - name: node-a
    defaultNamespace: kels-node-a
    variables:
      envType: node
      kels:
        testEndpoints: "true"
  - name: node-b
    defaultNamespace: kels-node-b
    variables:
      envType: node
      kels:
        testEndpoints: "true"
  - name: node-c
    defaultNamespace: kels-node-c
    variables:
      envType: node
  - name: node-d
    defaultNamespace: kels-node-d
    variables:
      envType: node
      kels:
        testEndpoints: "true"
  - name: node-e
    defaultNamespace: kels-node-e
    variables:
      envType: node
  - name: node-f
    defaultNamespace: kels-node-f
    variables:
      envType: node

providers:
  - name: local-kubernetes
    environments: [standalone, registry-a, registry-b, registry-c, registry-d, node-a, node-b, node-c, node-d, node-e, node-f]
    namespace:
      name: ${environment.namespace}
    setupIngressController: traefik
    defaultHostname: ${environment.namespace}.kels
    buildMode: local-docker

variables:
  rustLogLevel: info
  postgres:
    user: kels_admin
    password: use_something_better_in_production
    host: postgres
    port: 5432
    url: "postgres://${var.postgres.user}:${var.postgres.password}@${var.postgres.host}:${var.postgres.port}"
  redis:
    host: redis
    port: 6379
    kelsUrl: "redis://kels:${var.redis.kelsPassword}@${var.redis.host}:${var.redis.port}"
    kelsPassword: "kels-redis-pass"
    kelsPasswordHash: "7420117681f7f1de993fd5e0080a464e0232d4db1620e273623148f0ba8ac9d3"
    gossipUrl: "redis://gossip:${var.redis.gossipPassword}@${var.redis.host}:${var.redis.port}"
    gossipPassword: "gossip-redis-pass"
    gossipPasswordHash: "94f18ec001065c2ae1a41d4d2b3bd0cddd76105264833e267336ab8cd1cff0d3"
  kels:
    replicas: 2
    host: kels
    port: "80"
    url: http://${var.kels.host}:${var.kels.port}
    # Rate limiting
    maxSubmissionsPerPrefixPerMinute: "128"
    maxWritesPerIpPerSecond: "200"
    ipRateLimitBurst: "1000"
    nonceWindowSecs: "60"
    # Recovery archival
    recoveryIntervalSecs: "1"
    # Test config (remove for production)
    testEndpoints: "false"
  gossip:
    replicas: 1
    port: 4001
    httpListenHost: "0.0.0.0"
    httpPort: "80"
    topic: "kels/events/v1"
    listenAddress: "0.0.0.0:${var.gossip.port}"
    antiEntropyIntervalSecs: "10"
  registry:
    replicas: 1
    port: "80"
    heartbeatTimeoutSecs: "60"
  identity:
    port: "80"
    host: identity
    url: http://${var.identity.host}:${var.identity.port}
    rotationIntervalDays: "180"
    rotationCheckPeriodMinutes: "360"
    signingAlgorithm: "ml-dsa-65"
    recoveryAlgorithm: "ml-dsa-87"
    pkcs11Library: "/app/libkels_mock_hsm.so"
    hsmDataDir: "/data/hsm"
    hsmPin: "1234"
