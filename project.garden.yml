apiVersion: garden.io/v2
kind: Project
name: kels
defaultEnvironment: standalone

environments:
  - name: registry-a
    defaultNamespace: kels-registry-a
    variables:
      envType: registry
  - name: registry-b
    defaultNamespace: kels-registry-b
    variables:
      envType: registry
  - name: registry-c
    defaultNamespace: kels-registry-c
    variables:
      envType: registry
  - name: registry-d
    defaultNamespace: kels-registry-d
    variables:
      envType: registry
  - name: standalone
    defaultNamespace: kels-standalone
    variables:
      envType: standalone
      kels:
        testEndpoints: "true"
  - name: node-a
    defaultNamespace: kels-node-a
    variables:
      envType: node
      kels:
        testEndpoints: "true"
  - name: node-b
    defaultNamespace: kels-node-b
    variables:
      envType: node
      kels:
        testEndpoints: "true"
  - name: node-c
    defaultNamespace: kels-node-c
    variables:
      envType: node
  - name: node-d
    defaultNamespace: kels-node-d
    variables:
      envType: node
      kels:
        testEndpoints: "true"
  - name: node-e
    defaultNamespace: kels-node-e
    variables:
      envType: node
  - name: node-f
    defaultNamespace: kels-node-f
    variables:
      envType: node

providers:
  - name: local-kubernetes
    environments: [standalone, registry-a, registry-b, registry-c, registry-d, node-a, node-b, node-c, node-d, node-e, node-f]
    namespace:
      name: ${environment.namespace}
    setupIngressController: traefik
    defaultHostname: ${environment.name}.kels
    buildMode: local-docker

variables:
  rustLogLevel: info
  postgres:
    user: kels_admin
    password: use_something_better_in_production
    host: postgres
    port: 5432
    url: "postgres://${var.postgres.user}:${var.postgres.password}@${var.postgres.host}:${var.postgres.port}"
  redis:
    host: redis
    port: 6379
    kelsUrl: "redis://kels:${var.redis.kelsPassword}@${var.redis.host}:${var.redis.port}"
    kelsPassword: "kels-redis-pass"
    kelsPasswordHash: "7420117681f7f1de993fd5e0080a464e0232d4db1620e273623148f0ba8ac9d3"
    gossipUrl: "redis://gossip:${var.redis.gossipPassword}@${var.redis.host}:${var.redis.port}"
    gossipPassword: "gossip-redis-pass"
    gossipPasswordHash: "94f18ec001065c2ae1a41d4d2b3bd0cddd76105264833e267336ab8cd1cff0d3"
    sadstoreUrl: "redis://sadstore:${var.redis.sadstorePassword}@${var.redis.host}:${var.redis.port}"
    sadstorePassword: "sadstore-redis-pass"
    sadstorePasswordHash: "6a3c9e0faf19ebda997ac4ce6c3f5e8c41f2a37166fa24dd6a7691750a1d216f"
    mailUrl: "redis://mail:${var.redis.mailPassword}@${var.redis.host}:${var.redis.port}"
    mailPassword: "mail-redis-pass"
    mailPasswordHash: "3554586698768bb04c774c633051ff9bf8f73201eb32d09d792ca288e03c313c"
  kels:
    replicas: 2
    host: kels
    port: "80"
    url: http://${var.kels.host}:${var.kels.port}
    # Rate limiting
    maxEventsPerPrefixPerDay: "256"
    maxWritesPerIpPerSecond: "256"
    ipRateLimitBurst: "1024"
    nonceWindowSecs: "60"
    # Test config (remove for production)
    testEndpoints: "false"
  gossip:
    replicas: 1
    port: 4001
    httpListenHost: "0.0.0.0"
    httpPort: "80"
    topic: "kels/events/v1"
    listenAddress: "0.0.0.0:${var.gossip.port}"
    antiEntropyIntervalSecs: "10"
  registry:
    replicas: 1
    port: "80"
    heartbeatTimeoutSecs: "60"
  minio:
    host: minio
    port: "9000"
    region: "us-east-1"
    accessKey: "minioadmin"
    secretKey: "minioadmin"
  sadstore:
    replicas: 1
    port: "80"
    bucket: "kels-sad"
    maxEventsPerEventLogPerDay: "8"
    maxWritesPerIpPerSecond: "256"
    ipRateLimitBurst: "1024"
    maxObjectSize: "1048576"
  mail:
    replicas: 1
    port: "80"
    bucket: "kels-mail"
    maxMessagesPerSenderPerDay: "128"
    maxWritesPerIpPerSecond: "256"
    ipRateLimitBurst: "1024"
    maxInboxSize: "8192"
    maxStoragePerRecipientMb: "128"
    maxBlobSizeBytes: "1048576"
    messageTtlDays: "30"
  identity:
    port: "80"
    host: identity
    url: http://${var.identity.host}:${var.identity.port}
    rotationIntervalDays: "180"
    rotationCheckPeriodMinutes: "360"
    signingAlgorithm: "ml-dsa-65"
    recoveryAlgorithm: "ml-dsa-87"
    pkcs11Library: "/app/libkels_mock_hsm.so"
    hsmDataDir: "/data/hsm"
    hsmPin: "1234"
