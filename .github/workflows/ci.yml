name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Compile-time trusted registry prefixes (for CLI and gossip service)
  TRUSTED_REGISTRY_PREFIXES: KAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
  TRUSTED_REGISTRY_MEMBERS: '[{"id":0,"prefix":"KAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}]'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint-terminology:
    name: Lint Terminology
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint-terminology

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - name: Run cargo deny on all crates
        run: |
          for dir in \
            lib/kels \
            lib/derive \
            lib/ffi \
            services/identity \
            services/kels \
            services/gossip \
            services/registry \
            clients/cli \
            clients/bench
          do
            echo "Checking $dir..."
            (cd "$dir" && cargo deny check -A no-license-field) || exit 1
          done

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Exclude secure-enclave: requires macOS 26+ CryptoKit ML-DSA APIs not yet on CI runners
      - run: cargo clippy --workspace --all-targets --features=dev-tools -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # this is slightly different than the Makefile, we can't use all-features and must instead
      # use dev-tools to allow tests to pass without some macos dependencies. dev-tools allows 
      # certain tests like the prefix fetch tests to avoid constructing authenticated clients
      - run: cargo test --workspace --release --features=dev-tools

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
