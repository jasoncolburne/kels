kind: Build
name: kels
type: container

# KELS service is not needed in the registry environment
disabled: ${var.envType == "registry"}

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/kels-derive/**/*
  - services/kels/**/*
  - project.garden.yml

spec:
  dockerfile: services/kels/Dockerfile

---

kind: Deploy
name: kels
type: kubernetes

# KELS service is not needed in the registry environment
disabled: ${var.envType == "registry"}

dependencies:
  - build.kels
  - deploy.postgres
  # Note: deploy.redis is intentionally not listed as a dependency. Redis is
  # optional — the kels service runs without it in standalone mode. In federated
  # deployments, the wait-for-redis initContainer handles startup ordering.

variables:
  kelsDatabaseUrl: ${var.postgres.url}/kels
  redisUrl: "${var.envType != 'standalone' ? var.redis.kelsUrl : ''}"
  federationRegistryUrls: "${var.envType != 'standalone' ? actions.run.federation-read-urls.outputs.log : ''}"
  maxSubmissionsPerPrefixPerMinute: "${var.kels.maxSubmissionsPerPrefixPerMinute}"
  maxWritesPerIpPerSecond: "${var.kels.maxWritesPerIpPerSecond}"
  ipRateLimitBurst: "${var.kels.ipRateLimitBurst}"
  nonceWindowSecs: "${var.kels.nonceWindowSecs}"
  recoveryIntervalSecs: "${var.kels.recoveryIntervalSecs}"
  testEndpoints: "${var.kels.testEndpoints}"

spec:
  manifestTemplates:
    - "${var.envType == 'standalone' ? 'manifests-standalone.yml.tpl' : 'manifests.yml.tpl'}"
