# cargo-deny configuration

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    # lru unsoundness — transitive dependency via aws-sdk-s3, pinned at 0.12.x upstream
    "RUSTSEC-2026-0002",
    # rand 0.8 unsoundness in ThreadRng — transitive dep via sqlx-postgres; we don't use ThreadRng
    "RUSTSEC-2026-0097",
    # rustls-webpki 0.101.x name constraint bugs — transitive dep via aws-sdk-s3 → rustls 0.21; fix requires >=0.103.12 but AWS SDK pins 0.101.x
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "Unlicense",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["jasoncolburne"]
gitlab = []
bitbucket = []
