kind: Build
name: mail
type: container

disabled: ${var.envType == "registry"}

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/derive/**/*
  - lib/exchange/**/*
  - services/mail/**/*
  - project.garden.yml

spec:
  dockerfile: services/mail/Dockerfile

---

kind: Deploy
name: mail
type: kubernetes

disabled: ${var.envType == "registry"}

dependencies:
  - build.mail
  - deploy.postgres
  - deploy.minio
  - deploy.kels
  - deploy.identity
  # Note: deploy.redis is intentionally not listed as a dependency. Redis is
  # optional — the mail service runs without it in standalone mode. In federated
  # deployments, the wait-for-redis initContainer handles startup ordering.

variables:
  mailDatabaseUrl: ${var.postgres.url}/mail

spec:
  manifestTemplates:
    - "${var.envType == 'standalone' ? 'manifests-standalone.yml.tpl' : 'manifests-node.yml.tpl'}"
