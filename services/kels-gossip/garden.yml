kind: Build
name: kels-gossip
type: container

# Gossip service is not needed in the registry environment
disabled: ${var.envType == "registry"}

dependencies:
  - run.federation-read-prefixes

source:
  path: ../..  # Set build context to repository root

include:
  - lib/gossip/**/*
  - lib/kels/**/*
  - lib/kels-derive/**/*
  - services/kels-gossip/**/*
  - project.garden.yml
  - .kels/federated-registries.json

spec:
  dockerfile: services/kels-gossip/Dockerfile
  buildArgs:
    # TRUSTED_REGISTRY_PREFIXES is compiled into the binary for security
    TRUSTED_REGISTRY_PREFIXES: ${actions.run.federation-read-prefixes.outputs.log}

---

kind: Deploy
name: kels-gossip
type: kubernetes

# Gossip service is not needed in the registry environment
disabled: ${var.envType == "registry"}

dependencies:
  - run.federation-read-url
  - run.federation-read-urls
  - build.kels-gossip
  - deploy.kels
  - deploy.redis
  - deploy.hsm
  - deploy.identity

variables:
  federationRegistryUrls: ${actions.run.federation-read-urls.outputs.log}
  gossipAdvertiseAddress: "kels-gossip.kels-${environment.name}.kels:${var.gossip.port}"
  gossipAntiEntropyIntervalSecs: "${var.gossip.antiEntropyIntervalSecs}"
  identityUrl: ${var.identity.url}
  kelsAdvertiseUrl: "http://kels.kels-${environment.name}.kels"
  registryUrl: ${actions.run.federation-read-url.outputs.log}

spec:
  manifestTemplates:
    - manifests.yml.tpl

---

kind: Run
name: fetch-gossip-identity
type: exec

disabled: ${var.envType == "registry"}

dependencies:
  - deploy.kels-gossip

spec:
  command:
    - bash
    - ../../scripts/fetch-gossip-identity.sh
    - ${environment.namespace}
