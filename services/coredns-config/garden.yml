kind: Run
name: coredns-config
type: exec
description: Configure CoreDNS to resolve .kels domains inside the cluster

source:
  path: ../..

include:
  - scripts/coredns.sh

spec:
  command:
    - bash
    - scripts/coredns.sh
    - configure

---
kind: Run
name: coredns-unconfig
type: exec
description: Stop CoreDNS from rewriting .kels domains inside the cluster

source:
  path: ../..

include:
  - scripts/coredns.sh

spec:
  command:
    - bash
    - scripts/coredns.sh
    - unconfigure
