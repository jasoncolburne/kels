kind: Build
name: kels-registry
type: container

disabled: ${var.envType != "registry"}

dependencies:
  - run.federation-read-prefixes
  - run.federation-read-members

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/kels-derive/**/*
  - services/kels-registry/**/*
  - project.garden.yml
  - .kels/federated-registries.json

spec:
  dockerfile: services/kels-registry/Dockerfile
  buildArgs:
    TRUSTED_REGISTRY_PREFIXES: ${actions.run.federation-read-prefixes.outputs.log}
    TRUSTED_REGISTRY_MEMBERS: ${actions.run.federation-read-members.outputs.log}

---

kind: Deploy
name: kels-registry
type: kubernetes

disabled: ${var.envType != "registry"}

dependencies:
  - build.kels-registry
  - deploy.redis
  - deploy.postgres
  - deploy.identity
  - run.federation-read-prefix
  - run.federation-read-member-urls

variables:
  kelsRegistryDatabaseUrl: ${var.postgres.url}/kels_registry
  identityUrl: ${var.identity.url}
  federationSelfPrefix: ${actions.run.federation-read-prefix.outputs.log}
  federationUrls: ${actions.run.federation-read-member-urls.outputs.log}

spec:
  manifestTemplates:
    - manifests.yml.tpl

---

kind: Run
name: federation-fetch
type: exec

disabled: ${var.envType != "registry"}

dependencies:
  - deploy.identity

spec:
  command:
    - bash
    - ../../scripts/federation-fetch.sh
    - ${environment.name}
    - ${environment.namespace}
    - ../..

---

# Propose core peer actions (creates proposal, outputs proposal ID)

kind: Run
name: propose-add-node-a
type: exec

source:
  path: ../..

disabled: ${var.envType != "registry"}

dependencies:
  - deploy.kels-registry

spec:
  command:
    - bash
    - scripts/propose-add-peer.sh
    - node-a

