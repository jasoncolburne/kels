kind: Build
name: identity
type: container

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/kels-derive/**/*
  - lib/kels-mock-hsm/**/*
  - services/identity/**/*
  - project.garden.yml

spec:
  dockerfile: services/identity/Dockerfile

---

kind: Deploy
name: identity
type: kubernetes

dependencies:
  - build.identity
  - deploy.postgres

variables:
  identityDatabaseUrl: ${var.postgres.url}/identity
  identityKeyHandlePrefix: "${var.envType == 'registry' ? 'kels-registry' : 'kels-gossip'}"
  kelForwardUrl: "${var.envType == 'registry' ? 'http://kels-registry:' + var.registry.port : var.kels.url}"
  kelForwardPathPrefix: "${var.envType == 'registry' ? '/api/member-kels' : '/api/kels'}"

spec:
  manifestTemplates:
    - manifests.yml.tpl
