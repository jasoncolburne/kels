kind: Build
name: identity
type: container

disabled: ${var.envType == "standalone"}

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/derive/**/*
  - lib/mock-hsm/**/*
  - services/identity/**/*
  - project.garden.yml

spec:
  dockerfile: services/identity/Dockerfile

---

kind: Deploy
name: identity
type: kubernetes

disabled: ${var.envType == "standalone"}

dependencies:
  - build.identity
  - deploy.postgres

variables:
  identityDatabaseUrl: ${var.postgres.url}/identity
  identityKeyHandlePrefix: "${var.envType == 'registry' ? 'registry' : 'gossip'}"
  kelForwardUrl: "${var.envType == 'registry' ? 'http://registry:' + var.registry.port : var.kels.url}"
  kelForwardPathPrefix: "${var.envType == 'registry' ? '/api/v1/member-kels' : '/api/v1/kels'}"

spec:
  manifestTemplates:
    - manifests.yml.tpl
