kind: Build
name: identity
type: container

dependencies:
  - run.federation-read-prefixes

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/kels-derive/**/*
  - services/identity/**/*
  - project.garden.yml
  - .kels/federated-registries.json

spec:
  dockerfile: services/identity/Dockerfile
  buildArgs:
    # TRUSTED_REGISTRY_PREFIXES is compiled into the binary for security
    TRUSTED_REGISTRY_PREFIXES: ${actions.run.federation-read-prefixes.outputs.log}

---

kind: Deploy
name: identity
type: kubernetes

dependencies:
  - build.identity
  - deploy.postgres
  - deploy.hsm

variables:
  identityDatabaseUrl: ${var.postgres.url}/identity
  identityKeyHandlePrefix: "${var.envType == 'registry' ? 'kels-registry' : 'kels-gossip'}"
  kelForwardUrl: "${var.envType == 'registry' ? 'http://kels-registry:' + var.registry.port : var.kels.url}"
  kelForwardPathPrefix: "${var.envType == 'registry' ? '/api/member-kels' : '/api/kels'}"

spec:
  manifestTemplates:
    - manifests.yml.tpl
