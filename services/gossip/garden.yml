kind: Build
name: gossip
type: container

# Gossip service is not needed in the registry environment
disabled: ${var.envType == "registry" || var.envType == "standalone"}

dependencies:
  - run.federation-read-prefixes

source:
  path: ../..  # Set build context to repository root

include:
  - lib/gossip/**/*
  - lib/kels/**/*
  - lib/exchange/**/*
  - lib/derive/**/*
  - services/gossip/**/*
  - project.garden.yml
  - .kels/federated-registries.json

spec:
  dockerfile: services/gossip/Dockerfile
  buildArgs:
    # TRUSTED_REGISTRY_PREFIXES is compiled into the binary for security
    TRUSTED_REGISTRY_PREFIXES: ${actions.run.federation-read-prefixes.outputs.log}

---

kind: Deploy
name: gossip
type: kubernetes

# Gossip service is not needed in the registry environment
disabled: ${var.envType == "registry" || var.envType == "standalone"}

dependencies:
  - run.federation-read-urls
  - build.gossip
  - deploy.postgres
  - deploy.kels
  - deploy.redis
  - deploy.identity
  - deploy.sadstore
  - deploy.mail

variables:
  gossipDatabaseUrl: ${var.postgres.url}/kels_gossip
  federationRegistryUrls: ${actions.run.federation-read-urls.outputs.log}
  gossipAdvertiseAddress: "gossip.${environment.name}.kels:${var.gossip.port}"

spec:
  manifestTemplates:
    - manifests.yml.tpl

---

kind: Run
name: fetch-gossip-identity
type: exec

disabled: ${var.envType == "registry" || var.envType == "standalone"}

dependencies:
  - deploy.gossip

spec:
  command:
    - bash
    - ../../scripts/fetch-gossip-identity.sh
    - ${environment.namespace}
