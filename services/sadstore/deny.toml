# cargo-deny configuration for kels-sadstore

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained - transitive dev dependency via testcontainers" },
    { id = "RUSTSEC-2026-0066", reason = "astral-tokio-tar PAX validation - transitive dev dependency via testcontainers" },
    { id = "RUSTSEC-2026-0002", reason = "lru unsoundness - transitive dependency via aws-sdk-s3, pinned at 0.12.x by upstream" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["jasoncolburne"]
gitlab = []
bitbucket = []
