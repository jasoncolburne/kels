kind: Build
name: sadstore
type: container

# SADStore is not needed in the registry environment
disabled: ${var.envType == "registry"}

source:
  path: ../..  # Set build context to repository root

include:
  - lib/kels/**/*
  - lib/derive/**/*
  - lib/policy/**/*
  - services/sadstore/**/*
  - project.garden.yml

spec:
  dockerfile: services/sadstore/Dockerfile

---

kind: Deploy
name: sadstore
type: kubernetes

# SADStore is not needed in the registry environment
disabled: ${var.envType == "registry"}

dependencies:
  - build.sadstore
  - deploy.postgres
  - deploy.minio

variables:
  sadstoreDatabaseUrl: ${var.postgres.url}/sadstore
  redisUrl: "${var.envType != 'standalone' ? var.redis.sadstoreUrl : ''}"
  federationRegistryUrls: ${actions.run.federation-read-urls.outputs.log}

spec:
  manifestTemplates:
    - manifests.yml.tpl
