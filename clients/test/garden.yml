kind: Build
name: test-client
type: container

dependencies:
  - run.federation-read-prefixes

source:
  path: ../..  # Set build context to repository root

include:
  - Cargo.toml
  - lib/kels/**/*
  - lib/kels-derive/**/*
  - clients/kels-bench/**/*
  - clients/kels-cli/**/*
  - clients/test/**/*

spec:
  dockerfile: clients/test/Dockerfile
  buildArgs:
    TRUSTED_REGISTRY_PREFIXES: ${actions.run.federation-read-prefixes.outputs.log}

---

kind: Deploy
name: test-client
type: kubernetes

# Only deploy test-client in node-a and standalone environments
disabled: ${environment.name != "node-a" && environment.name != "standalone"}

dependencies:
  - build.test-client
  - deploy.kels

spec:
  manifestTemplates:
    - manifests.yml.tpl
